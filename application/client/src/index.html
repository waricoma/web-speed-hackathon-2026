<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaX</title>
    <link rel="preconnect" href="/api" />
    <script>
      window.__PREFETCH__ = {
        "/api/v1/me": fetch("/api/v1/me").then(function(r){return r.ok?r.json():Promise.reject()}).catch(function(){return null}),
        "/api/v1/posts?offset=0&limit=5": fetch("/api/v1/posts?offset=0&limit=5").then(function(r){return r.json()}).then(function(posts){
          // Preload first post's images and profile images for LCP
          if(posts&&posts.length>0){
            posts.slice(0,3).forEach(function(p){
              if(p.images&&p.images[0]){
                var img=new Image();img.fetchPriority="high";img.src="/images/"+p.images[0].id+".jpg?w=640";
              }
              if(p.user&&p.user.profileImage){
                var pi=new Image();pi.src="/images/profiles/"+p.user.profileImage.id+".jpg";
              }
            });
          }
          return posts;
        })
      };
    </script>
  </head>
  <body class="bg-cax-canvas text-cax-text">
    <style>
      .bg-cax-canvas{background-color:#f5f5f4}
      .text-cax-text{color:#042f2e}
      .sk{animation:pulse 1.5s ease-in-out infinite}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    </style>
    <script>document.addEventListener("click",function(e){var b=e.target.closest("[data-commandfor]");if(b){var d=document.getElementById(b.dataset.commandfor);if(d&&d.showModal)d.showModal()}})</script>
    <div id="app">
      <div style="max-width:640px;margin:0 auto;padding:1rem">
        <div class="sk" style="height:48px;background:#e7e5e4;border-radius:8px;margin-bottom:1rem"></div>
        <div class="sk" style="height:140px;background:#fff;border-radius:8px;margin-bottom:0.5rem;border:1px solid #e7e5e4"></div>
        <div class="sk" style="height:140px;background:#fff;border-radius:8px;margin-bottom:0.5rem;border:1px solid #e7e5e4"></div>
        <div class="sk" style="height:140px;background:#fff;border-radius:8px;margin-bottom:0.5rem;border:1px solid #e7e5e4"></div>
      </div>
    </div>
  </body>
</html>
